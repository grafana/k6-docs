name: publish-technical-documentation-k6-studio

on:
  push:
    branches:
      - main
    paths:
      - "docs/sources/k6-studio/**"
  workflow_dispatch:
jobs:
  sync:
    if: github.repository == 'grafana/k6-docs'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: grafana/writers-toolkit/publish-technical-documentation@9aed4f7c5b3caa1b58d72ee39232333407d4acbf # publish-technical-documentation/v1
        with:
          source_directory: docs/sources/k6-studio
          website_directory: content/docs/k6-studio
